services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chris
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chris
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chris -d chris"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chris:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://chris:${POSTGRES_PASSWORD}@postgres:5432/chris
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
