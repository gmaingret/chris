# Docker Compose for LOCAL development and testing.
# Spins up just Postgres with pgvector — the app runs on the host.
# Usage: docker compose -f docker-compose.test.yml up -d
#        DATABASE_URL=postgresql://chris:testpass@localhost:5432/chris_test npx vitest run

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chris
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: chris_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chris -d chris_test"]
      interval: 2s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
