services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chris
      POSTGRES_PASSWORD: localtest123
      POSTGRES_DB: chris
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chris -d chris"]
      interval: 2s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  chris:
    image: chris-chris:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: test-key-for-local
      TELEGRAM_BOT_TOKEN: test-token-for-local
      TELEGRAM_AUTHORIZED_USER_ID: "123456"
      DATABASE_URL: postgresql://chris:localtest123@postgres:5432/chris
      LOG_LEVEL: debug
      SYNC_ENABLED: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
